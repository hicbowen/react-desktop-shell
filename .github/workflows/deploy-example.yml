name: Deploy example to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-example-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check deployment credential
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -z "$PAGES_DEPLOY_TOKEN" ]; then
            echo "::error::Add the PAGES_DEPLOY_TOKEN repository secret before deploying."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build example
        run: npm run build:example

      - name: Deploy example
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: react-desktop-shell/react-desktop-shell.github.io
          publish_branch: main
          publish_dir: ./example/dist
          full_commit_message: Deploy example from ${{ github.repository }}@${{ github.sha }}
